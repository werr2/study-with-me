<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StudyWithMe - AI Precision Matching</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#f98d53",
                    "background-light": "#f8f6f5", 
                    "background-dark": "#23160f",
                    "warm-canvas": "#F9F2EF",
                },
                fontFamily: {
                    "display": ["Lexend", "sans-serif"],
                    "body": ["Noto Sans SC", "sans-serif"],
                },
                borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                boxShadow: {
                    'soft': '0 4px 20px -2px rgba(249, 141, 83, 0.1)',
                    'card': '0 2px 10px rgba(28, 18, 13, 0.03)',
                    'floating': '0 8px 30px rgba(28, 18, 13, 0.08)',
                }
            },
        },
    }
</script>
<style>
    html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
    }
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .material-symbols-outlined.fill {
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    ::-webkit-scrollbar {
        width: 8px;
    }
    ::-webkit-scrollbar-track {
        background: transparent;
    }
    ::-webkit-scrollbar-thumb {
        background: #e9d7ce;
        border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: #d4bbae;
    }
    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
        100% { transform: translateY(0px); }
    }
    .animate-float {
        animation: float 4s ease-in-out infinite;
    }
</style>
</head>
<body class="bg-warm-canvas dark:bg-background-dark text-[#1c120d] dark:text-[#f8f6f5] flex font-body selection:bg-primary/30">

<aside class="w-64 bg-white/60 dark:bg-[#2a1d16]/60 border-r border-[#e9d7ce] dark:border-[#3a261c] flex flex-col shrink-0 z-20 backdrop-blur-md transition-all duration-300 h-full">
    <div class="h-20 flex items-center px-8">
        <div class="flex flex-col">
            <h1 class="font-display text-xl font-bold text-[#1c120d] dark:text-white tracking-tight">StudyWithMe</h1>
            <p class="text-[#9d6648] text-xs mt-0.5">Mobile-first WebApp</p>
        </div>
    </div>
    <nav class="flex-1 px-3 py-6 flex flex-col gap-3">
        <a class="flex items-center gap-4 px-3 py-3 rounded-xl bg-[#f4ebe7] dark:bg-primary/20 text-[#1c120d] dark:text-white group transition-colors relative" href="match_home.html">
            <span class="material-symbols-outlined fill text-primary dark:text-primary">home</span>
            <span class="font-medium">首页</span>
            <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-8 bg-primary rounded-r-full"></div>
        </a>
        <a class="flex items-center gap-4 px-3 py-3 rounded-xl hover:bg-white/50 dark:hover:bg-white/5 text-[#5e4033] dark:text-[#d0c0b6] transition-colors group" href="toolbox.html">
            <span class="material-symbols-outlined group-hover:text-primary transition-colors">grid_view</span>
            <span class="font-medium">工具箱</span>
        </a>
        <a class="flex items-center gap-4 px-3 py-3 rounded-xl hover:bg-white/50 dark:hover:bg-white/5 text-[#5e4033] dark:text-[#d0c0b6] transition-colors group" href="ai_help.html">
            <span class="material-symbols-outlined group-hover:text-primary transition-colors">chat_bubble</span>
            <span class="font-medium">消息</span>
        </a>
        <a class="flex items-center gap-4 px-3 py-3 rounded-xl hover:bg-white/50 dark:hover:bg-white/5 text-[#5e4033] dark:text-[#d0c0b6] transition-colors group" href="profile.html">
            <span class="material-symbols-outlined group-hover:text-primary transition-colors">person</span>
            <span class="font-medium">我的</span>
        </a>
    </nav>
    <div class="p-4 border-t border-[#e9d7ce] dark:border-[#3a261c] mb-2">
        <div class="flex items-center gap-3 px-4 cursor-pointer hover:opacity-80 transition-opacity">
            <div class="w-10 h-10 rounded-full bg-cover bg-center ring-2 ring-white dark:ring-[#23160f] shadow-sm" style="background-image: url('./dist/assets/image/left_user.png')"></div>
            <div class="overflow-hidden">
                <p class="text-sm font-bold truncate">Alex Chen</p>
                <p class="text-xs text-[#9d6648]">专注时长: 42h</p>
            </div>
        </div>
    </div>
</aside>

<main class="flex-1 flex flex-col relative overflow-hidden h-full bg-warm-canvas dark:bg-background-dark">
    <header class="px-6 lg:px-12 pt-8 pb-4 z-10 sticky top-0 bg-warm-canvas/90 dark:bg-background-dark/90 backdrop-blur-sm">
        <div class="max-w-full mx-auto w-full flex items-center gap-4">
            <a href="match_home.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-white dark:bg-[#2a1d16] hover:bg-[#e9d7ce] dark:hover:bg-white/10 text-[#5e4033] dark:text-white transition-colors shadow-sm">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <div class="flex flex-col">
                <h2 class="font-display font-bold text-2xl text-[#1c120d] dark:text-white">AI 精准匹配</h2>
                <p class="text-sm text-[#9d6648] dark:text-[#a08d84]">告诉 AI 你的需求，为你找到最完美的学习伙伴</p>
            </div>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto px-6 lg:px-12 pb-32" id="main-scroll">
        <div class="max-w-full mx-auto w-full py-2">
            <div class="flex gap-4 mb-8 items-start">
                <div class="w-12 h-12 rounded-full bg-gradient-to-br from-[#f98d53] to-[#ffb088] flex items-center justify-center shadow-lg shrink-0 text-white animate-float">
                    <span class="material-symbols-outlined text-2xl">smart_toy</span>
                </div>
                <div class="bg-white dark:bg-[#2a1d16] p-5 rounded-2xl rounded-tl-none shadow-card border border-white/50 dark:border-white/5 max-w-lg">
                    <p class="text-[#5e4033] dark:text-[#d0c0b6] leading-relaxed">
                        嗨，我是你的 AI 匹配助手！✨<br/>
                        为了帮你找到同频的伙伴，我需要了解一下你今天的学习计划。让我们开始吧？
                    </p>
                </div>
            </div>

            <div class="mb-10">
                <h3 class="flex items-center gap-2 text-lg font-bold text-[#1c120d] dark:text-white mb-4 ml-1">
                    <span class="w-1.5 h-6 bg-primary rounded-full"></span>
                    1. 只要告诉我，今天要攻克什么？
                </h3>
                <div class="bg-white/60 dark:bg-[#2a1d16]/40 rounded-3xl p-6 border border-[#e9d7ce]/30 dark:border-white/5">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <label class="cursor-pointer group relative">
                            <input checked class="peer sr-only" name="subject" type="radio"/>
                            <div class="h-full p-4 rounded-2xl bg-white dark:bg-[#2a1d16] border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 shadow-card hover:shadow-lg transition-all flex flex-col items-center justify-center gap-2 text-center">
                                <span class="text-2xl group-hover:scale-110 transition-transform duration-300">📚</span>
                                <span class="font-bold text-[#5e4033] dark:text-[#d0c0b6] peer-checked:text-primary">考研/考公</span>
                            </div>
                            <div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 text-primary transition-opacity">
                                <span class="material-symbols-outlined text-lg">check_circle</span>
                            </div>
                        </label>
                        <label class="cursor-pointer group relative">
                            <input class="peer sr-only" name="subject" type="radio"/>
                            <div class="h-full p-4 rounded-2xl bg-white dark:bg-[#2a1d16] border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 shadow-card hover:shadow-lg transition-all flex flex-col items-center justify-center gap-2 text-center">
                                <span class="text-2xl group-hover:scale-110 transition-transform duration-300">💬</span>
                                <span class="font-bold text-[#5e4033] dark:text-[#d0c0b6] peer-checked:text-primary">语言学习</span>
                            </div>
                            <div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 text-primary transition-opacity">
                                <span class="material-symbols-outlined text-lg">check_circle</span>
                            </div>
                        </label>
                        <label class="cursor-pointer group relative">
                            <input class="peer sr-only" name="subject" type="radio"/>
                            <div class="h-full p-4 rounded-2xl bg-white dark:bg-[#2a1d16] border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 shadow-card hover:shadow-lg transition-all flex flex-col items-center justify-center gap-2 text-center">
                                <span class="text-2xl group-hover:scale-110 transition-transform duration-300">💻</span>
                                <span class="font-bold text-[#5e4033] dark:text-[#d0c0b6] peer-checked:text-primary">编程开发</span>
                            </div>
                            <div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 text-primary transition-opacity">
                                <span class="material-symbols-outlined text-lg">check_circle</span>
                            </div>
                        </label>
                        <label class="cursor-pointer group relative">
                            <input class="peer sr-only" name="subject" type="radio"/>
                            <div class="h-full p-4 rounded-2xl bg-white dark:bg-[#2a1d16] border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 shadow-card hover:shadow-lg transition-all flex flex-col items-center justify-center gap-2 text-center">
                                <span class="text-2xl group-hover:scale-110 transition-transform duration-300">🎨</span>
                                <span class="font-bold text-[#5e4033] dark:text-[#d0c0b6] peer-checked:text-primary">设计/创作</span>
                            </div>
                            <div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 text-primary transition-opacity">
                                <span class="material-symbols-outlined text-lg">check_circle</span>
                            </div>
                        </label>
                    </div>
                    <div class="mt-4 relative">
                        <input class="w-full pl-4 pr-10 py-3 rounded-xl bg-white dark:bg-[#2a1d16] border border-transparent focus:border-primary focus:ring-0 text-[#5e4033] dark:text-[#d0c0b6] placeholder:text-[#9d6648]/50 shadow-sm outline-none transition-all" placeholder="或者输入其他科目，如：CPA会计..." type="text"/>
                        <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-[#9d6648]/50">edit</span>
                    </div>
                </div>
            </div>

            <div class="mb-10">
                <h3 class="flex items-center gap-2 text-lg font-bold text-[#1c120d] dark:text-white mb-4 ml-1">
                    <span class="w-1.5 h-6 bg-primary rounded-full"></span>
                    2. 计划专注多久？
                </h3>
                <div class="bg-white/60 dark:bg-[#2a1d16]/40 rounded-3xl p-6 border border-[#e9d7ce]/30 dark:border-white/5">
                    <div class="flex flex-wrap gap-3">
                        <label class="cursor-pointer">
                            <input class="peer sr-only" name="duration" type="radio"/>
                            <span class="inline-block px-5 py-2.5 rounded-full bg-white dark:bg-[#2a1d16] text-[#5e4033] dark:text-[#d0c0b6] border border-transparent peer-checked:bg-primary peer-checked:text-[#1c120d] peer-checked:shadow-md hover:scale-105 transition-all duration-300 shadow-sm font-medium">
                                25 分钟 (番茄钟)
                            </span>
                        </label>
                        <label class="cursor-pointer">
                            <input checked class="peer sr-only" name="duration" type="radio"/>
                            <span class="inline-block px-5 py-2.5 rounded-full bg-white dark:bg-[#2a1d16] text-[#5e4033] dark:text-[#d0c0b6] border border-transparent peer-checked:bg-primary peer-checked:text-[#1c120d] peer-checked:shadow-md hover:scale-105 transition-all duration-300 shadow-sm font-medium">
                                45 分钟
                            </span>
                        </label>
                        <label class="cursor-pointer">
                            <input class="peer sr-only" name="duration" type="radio"/>
                            <span class="inline-block px-5 py-2.5 rounded-full bg-white dark:bg-[#2a1d16] text-[#5e4033] dark:text-[#d0c0b6] border border-transparent peer-checked:bg-primary peer-checked:text-[#1c120d] peer-checked:shadow-md hover:scale-105 transition-all duration-300 shadow-sm font-medium">
                                60 分钟
                            </span>
                        </label>
                        <label class="cursor-pointer">
                            <input class="peer sr-only" name="duration" type="radio"/>
                            <span class="inline-block px-5 py-2.5 rounded-full bg-white dark:bg-[#2a1d16] text-[#5e4033] dark:text-[#d0c0b6] border border-transparent peer-checked:bg-primary peer-checked:text-[#1c120d] peer-checked:shadow-md hover:scale-105 transition-all duration-300 shadow-sm font-medium">
                                90+ 分钟
                            </span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="flex justify-center mt-12">
                <a href="guardian_profile.html" class="inline-block px-10 py-4 bg-primary text-white font-bold rounded-2xl shadow-lg shadow-primary/20 hover:shadow-xl hover:scale-105 transition-all">
                    开始匹配学习伙伴
                </a>
            </div>
        </div>
    </div>
</main>

</body>
</html>
