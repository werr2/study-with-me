                        "primary": "#F98C53",
                        "background-light": "#f8f6f5",

                        "warm-canvas": "#F9F2EF",

                    fontFamily: {
                        "display": ["Lexend", "sans-serif"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e9d7ce;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #d4bbae;
        }
        /* Additional styles from original profile page for compatibility */
        .profile-card {
          background: rgba(255, 255, 255, 0.6);
          backdrop-filter: blur(10px);
          border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .accent-button {
          background-color: #F98C53;
          transition: all 0.3s ease;
        }
        .accent-button:hover {
          background-color: #E87B42;
          transform: translateY(-1px);
        }
        .glass-item {
          background: white;
          border: 1px solid #F1E5DF;
          transition: background-color 0.2s;
        }
        .glass-item:hover {
          background-color: #FFF9F7;

</style>

<div class="flex flex-col">

</div>
</div>
<nav class="flex-1 px-3 py-6 flex flex-col gap-3">
<a class="flex items-center gap-4 px-3 py-3 rounded-xl hover:bg-white/50 dark:hover:bg-white/5 text-[#5e4033] dark:text-[#d0c0b6] transition-colors group" href="match_home.html">

<a class="flex items-center gap-4 px-3 py-3 rounded-xl bg-[#f4ebe7] dark:bg-primary/20 text-[#1c120d] dark:text-white group transition-colors relative" href="profile.html">

<main class="flex-1 overflow-y-auto p-12">

<!-- User Header Section -->
<div class="flex items-center mb-10" data-purpose="profile-header">

<div class="ml-8">

<div class="flex gap-4 mt-4">

<span class="text-xs bg-blue-100 text-blue-600 px-3 py-1 rounded-full">已坚持 143 天</span>
</div>
</div>

<!-- Call to Action: Study Data -->
<div class="mb-12">
<!-- 点击查看学习数据 → 跳转到累计数据页面 data_today.html -->
<button class="accent-button w-full py-5 rounded-2xl flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-orange-200" data-purpose="study-data-button" onclick="window.location.href='data_today.html'">
<svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

<!-- Left Column: Goals & Achievements -->
<section data-purpose="study-summary">
<h3 class="text-lg font-bold text-gray-700 mb-4 flex items-center">
<span class="w-1.5 h-6 bg-orange-400 rounded-full mr-3"></span>
      本周学习概览
    </h3>
<div class="profile-card p-6 rounded-3xl space-y-6">
<div class="flex justify-between items-center">
<div>
<p class="text-sm text-gray-400">总专注时长</p>

</div>
<div class="text-right">

</div>
</div>

<!-- Simple Progress Bar -->
<div class="w-full bg-white/50 rounded-full h-3">
<div class="bg-orange-400 h-3 rounded-full" style="width: 75%"></div>

<div>

<div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center text-xl" title="笔记专家">📝</div>
<div class="w-12 h-12 border-2 border-dashed border-gray-200 rounded-full flex items-center justify-center text-gray-300 text-sm">+5</div>
</div>
</div>
</div>
</section>

<span class="w-1.5 h-6 bg-orange-400 rounded-full mr-3"></span>

<div class="space-y-3">
<div class="glass-item p-4 rounded-2xl flex items-center justify-between cursor-pointer">
<div class="flex items-center">
<div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center text-blue-500 mr-4">

<div class="glass-item p-4 rounded-2xl flex items-center justify-between cursor-pointer">

</div>

<svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
