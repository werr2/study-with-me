<!-- 沉浸式视频学习界面 -->
<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>沉浸式视频学习界面</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100..900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f98d53",
                        "background-light": "#f8f6f5",
                        "background-dark": "#23160f",
                        "surface-light": "#ffffff",
                        "surface-dark": "#2d1e17",
                        "text-main": "#1c120d",
                        "text-muted": "#8a7a70",
                    },
                    fontFamily: {
                        "display": ["'Noto Sans SC'", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "2rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-main antialiased h-screen flex flex-col overflow-hidden transition-colors duration-300">

<header class="flex-none px-6 py-4 flex items-center justify-between z-20">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center size-10 rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined">school</span>
</div>
<div>
<h1 class="text-base font-bold leading-tight dark:text-white">与 Sarah 共学</h1>
<p class="text-sm text-text-muted dark:text-gray-400 flex items-center gap-1">
<span class="size-2 rounded-full bg-green-500 inline-block"></span>
                    高等数学
                </p>
</div>
</div>
<div class="hidden md:flex items-center gap-6 text-sm font-medium text-text-muted dark:text-gray-400">
<div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-surface-light dark:bg-surface-dark shadow-sm border border-gray-100 dark:border-gray-800">
<span class="material-symbols-outlined text-green-500 text-[18px]">signal_cellular_alt</span>
<span>网络良好</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">schedule</span>
<span>16:30</span>
</div>
</div>
<a href="match_home.html" class="flex items-center gap-2 bg-primary hover:bg-primary/90 text-white px-5 py-2.5 rounded-xl font-bold text-sm transition-all shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-[20px]">call_end</span>
<span>结束专注</span>
</a>
</header>

<main class="flex-1 relative w-full h-full px-4 pb-4 md:px-6 md:pb-6 flex flex-col items-center justify-center">
<div class="relative w-full max-w-[1280px] h-full bg-surface-dark rounded-2xl overflow-hidden shadow-2xl flex items-center justify-center group/video">
<div class="absolute inset-0 w-full h-full bg-cover bg-center" data-alt="Student studying with headphones on, focused expression" style="background-image: url('./dist/assets/image/me.png');">
<div class="absolute inset-0 bg-gradient-to-b from-black/10 via-transparent to-black/20"></div>
</div>
<div class="absolute top-4 right-4 w-32 md:w-48 aspect-video bg-gray-800 rounded-xl overflow-hidden shadow-lg border-2 border-white/10 cursor-move hover:scale-105 transition-transform z-10">
<div class="w-full h-full bg-cover bg-center" data-alt="Close up of user in video call self-view" style="background-image: url('./dist/assets/image/you.png');">
</div>
<div class="absolute bottom-2 left-2 bg-black/50 backdrop-blur-sm p-1 rounded-full text-white flex items-center justify-center">
<span class="material-symbols-outlined text-[14px]">mic_off</span>
</div>
</div>
<div class="absolute top-4 left-4 bg-black/40 backdrop-blur-md px-3 py-1.5 rounded-lg border border-white/10 text-white/90 text-xs font-medium flex items-center gap-2 opacity-0 group-hover/video:opacity-100 transition-opacity duration-300">
<span class="material-symbols-outlined text-[16px] text-primary">visibility</span>
                Sarah 正在专注
            </div>
<div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-3 md:gap-4 p-2 pl-4 pr-2 bg-white/90 dark:bg-surface-dark/90 backdrop-blur-xl border border-white/20 dark:border-gray-700 rounded-2xl shadow-xl transition-all hover:scale-[1.02]">
<div class="flex flex-col items-center justify-center px-4 border-r border-gray-200 dark:border-gray-700 mr-1">
<span class="text-2xl font-bold text-text-main dark:text-white tabular-nums tracking-tight">24:59</span>
<span class="text-[10px] uppercase tracking-wider font-semibold text-text-muted dark:text-gray-400">计时器</span>
</div>
<div class="flex items-center gap-2">
<button class="size-12 flex items-center justify-center rounded-xl bg-gray-100 dark:bg-gray-800 text-text-main dark:text-white hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" title="静音">
<span class="material-symbols-outlined">mic</span>
</button>
<button class="size-12 flex items-center justify-center rounded-xl bg-gray-100 dark:bg-gray-800 text-text-main dark:text-white hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" title="开启/关闭摄像头">
<span class="material-symbols-outlined">videocam</span>
</button>
</div>
<div class="w-px h-8 bg-gray-200 dark:border-gray-700 mx-1"></div>
<div class="flex items-center gap-2">
<button class="relative size-12 flex items-center justify-center rounded-xl bg-primary/10 text-primary hover:bg-primary/20 transition-colors group" title="求助">
<span class="material-symbols-outlined icon-filled group-hover:animate-pulse">pan_tool</span>
<span class="absolute -top-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-xs py-1 px-2 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">求助 / 提醒</span>
</button>
<button class="size-12 flex items-center justify-center rounded-xl bg-gray-100 dark:bg-gray-800 text-text-main dark:text-white hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors relative" title="聊天">
<span class="material-symbols-outlined">chat_bubble</span>
<span class="absolute top-3 right-3 size-2 bg-primary rounded-full border border-white dark:border-gray-800"></span>
</button>
</div>
<button class="size-10 flex items-center justify-center rounded-lg text-text-muted hover:text-text-main dark:hover:text-white transition-colors ml-1">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</div>
</main>

<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-500/5 rounded-full blur-3xl"></div>
</div>

</body>
</html>
